<html>
  <head>
    <meta charset="utf-8" />
    <title>Hashttp Demo</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <h1>Hashttp Demo</h1>
    <p>A minimal, dependency-free router that maps routes to files.</p>

    <nav>
      <ul>
        <li><a href="/articles">Articles (dynamic route)</a></li>
        <li><a href="/articles/hello-world">Article: hello-world (template)</a></li>
        <li><a href="/composed">Composed page (chunked)</a></li>
        <li><a href="/data.json">Static JSON</a></li>
        <li><a href="/missing-route">Unmatched route (404)</a></li>
      </ul>
    </nav>

    <section>
      <h2>Static file content from <code>/data.json</code></h2>
      <pre id="json-output">Loading...</pre>
    </section>

    <script>
      fetch('/data.json')
        .then((res) => res.json())
        .then((json) => {
          document.getElementById('json-output').textContent = JSON.stringify(json, null, 2);
        })
        .catch(() => {
          document.getElementById('json-output').textContent = 'Failed to load /data.json';
        });
    </script>
  </body>
</html>
